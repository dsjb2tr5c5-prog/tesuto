<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診察の流れ</title>
  <style>
    /* 1. 基本設定（隙間をなくす） */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      /* ボタンに被らないように下に余白を作る */
      padding-bottom: 80px;
    }

    /* 2. 画像の設定：縦にきれいに並べる */
    .image-list img {
      width: 100%;
      display: block; /* 画像の下に隙間を作らない設定 */
    }

    /* 3. 下の固定ボタン：横に2つ並べる */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex; /* 横並びにする設定 */
      height: 70px; /* ボタンの高さ */
      z-index: 100;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #ffffff;
      font-weight: bold;
      font-size: 18px;
    }

    /* 左側のボタン（戻る）の色 */
    .btn-back {
      flex: 1; /* 幅を均等にする */
      background-color: #9bc2e6; /* 水色 */
    }

    /* 右側のボタン（予約）の色 */
    .btn-reserve {
      flex: 1; /* 幅を均等にする */
      background-color: #4472c4; /* 青色 */
    }
  </style>
</head>
<body>

  <div class="image-list">
    <img src="IMG_1227.png">
    <img src="IMG_1228.png">
    <img src="IMG_1229.jpeg">
    <img src="IMG_1230.jpeg">
  </div>

  <div class="bottom-nav">
    <a href="https://line.me/R/ti/p/@468abuod" class="btn btn-back">戻る</a>
      <a href="https://liff.line.me/2009400645-19jige5V/salon/dateselector/week/2026/3/15?liff_id=2009400645-19jige5V&is=GN9yXejuAI" class="btn btn-reserve">予約する</a>
  </div>

</body>
</html>
